<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6c5ce7">
    <title>הכרטיסיה שלי</title>
    <link rel="stylesheet" href="style.css?v=14">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        .user-page {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }
        .club-logo {
            text-align: center;
            margin-bottom: 12px;
        }
        .club-logo img {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: var(--shadow);
        }
        .user-header {
            background: var(--primary);
            color: white;
            padding: 24px 20px;
            border-radius: 0 0 24px 24px;
            margin: -20px -20px 20px -20px;
            text-align: center;
        }
        .user-header h1 { font-size: 1.3rem; margin-bottom: 4px; }
        .balance-card {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }
        .balance-number {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
        }
        .balance-label {
            color: var(--text-light);
            margin-top: 8px;
            font-size: 1rem;
        }
        .balance-card.empty .balance-number { color: var(--danger); }
        .balance-card.low .balance-number { color: var(--warning); }
        .empty-msg {
            margin-top: 14px;
            padding: 10px;
            background: #f8d7da;
            color: #721c24;
            border-radius: 10px;
            font-size: 0.9rem;
        }
        .section-title {
            font-weight: 700;
            margin: 20px 0 10px;
            font-size: 1.05rem;
        }
        .not-found {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div id="content"></div>
    <script>
        (function() {
            const _cfg = {
                apiKey: "AIzaSyCOBQNSRju9Fgxy3_DZAWapzuyv0DoUUCo",
                projectId: "club-app-8f954",
                appId: "1:181296970595:web:6cd7578d10d563f3c73156"
            };

            function esc(str) {
                const d = document.createElement('div');
                d.textContent = str || '';
                return d.innerHTML;
            }
            function fmtDateTime(date) {
                return date.toLocaleDateString('he-IL') + ' ' +
                    date.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
            }

            const params = new URLSearchParams(location.search);
            const id = params.get('id');
            const content = document.getElementById('content');

            if (!id) {
                content.innerHTML = '<div class="not-found"><h2>משתתף לא נמצא</h2><p>ודא שסרקת את ה-QR האישי שלך</p></div>';
                return;
            }

            content.innerHTML = '<div style="text-align:center;padding:60px;color:#b2bec3;">טוען...</div>';

            if (!firebase.apps.length) firebase.initializeApp(_cfg);
            const db = firebase.firestore();
            db.enablePersistence().catch(() => {});

            let _member = null;
            let _checkins = [];

            function render() {
                if (!_member) {
                    content.innerHTML = '<div class="not-found"><h2>משתתף לא נמצא</h2><p>ודא שסרקת את ה-QR האישי שלך</p></div>';
                    return;
                }
                const balance = _member.balance || 0;
                const balanceClass = balance <= 0 ? 'empty' : (balance <= 2 ? 'low' : '');
                const sorted = _checkins.slice().sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                const historyHtml = sorted.slice(0, 15).map(c => `
                    <div class="recent-item">
                        <span>${fmtDateTime(new Date(c.timestamp))}</span>
                        <span>${c.entryType === 'couple' ? 'כניסה זוגית (-2)' : 'כניסה בודדת (-1)'}</span>
                    </div>
                `).join('') || '<p style="color:#b2bec3;text-align:center;padding:20px">אין כניסות עדיין</p>';

                content.innerHTML = `
                    <div class="user-page">
                        <div class="club-logo">
                            <img src="LOGO.jpg" alt="לוגו המועדון">
                        </div>
                        <div class="user-header">
                            ${_member.photo ? `<img src="${_member.photo}" class="avatar" style="width:70px;height:70px;margin-bottom:8px;border:3px solid white">` : ''}
                            <h1>👋 שלום, ${esc(_member.name)}</h1>
                            <p>הכרטיסיה האישית שלך</p>
                        </div>
                        <div class="balance-card ${balanceClass}">
                            <div class="balance-number">${balance}</div>
                            <div class="balance-label">כניסות נותרו</div>
                            ${balance <= 0 ? '<div class="empty-msg">אין יתרת כניסות. יש לפנות למנהל כדי להוסיף כניסות.</div>' : ''}
                        </div>
                        <div class="section-title">היסטוריית כניסות</div>
                        <div class="recent-list">${historyHtml}</div>
                    </div>
                `;
            }

            // Listen to member doc in real-time
            db.collection('members').doc(id).onSnapshot(doc => {
                _member = doc.exists ? doc.data() : null;
                render();
            }, () => {
                content.innerHTML = '<div class="not-found"><h2>שגיאת חיבור</h2><p>נסה שוב מאוחר יותר</p></div>';
            });

            // Listen to this member's checkins in real-time
            db.collection('checkins').where('memberId', '==', id).onSnapshot(snap => {
                _checkins = snap.docs.map(d => d.data());
                render();
            }, () => {});
        })();
    </script>
</body>
</html>
