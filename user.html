<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="הכרטיסיה שלי">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>הכרטיסיה שלי</title>
    <link rel="stylesheet" href="style.css?v=14">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="qrcode.min.js"></script>
    <style>
        .user-page {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }
        .club-logo {
            text-align: center;
            margin-bottom: 12px;
        }
        .club-logo img {
            width: 120px;
            height: auto;
            border-radius: 16px;
            object-fit: contain;
            box-shadow: var(--shadow);
        }
        .user-header {
            background: var(--primary);
            color: white;
            padding: 24px 20px;
            border-radius: 0 0 24px 24px;
            margin: -20px -20px 20px -20px;
            text-align: center;
        }
        .user-header h1 { font-size: 1.3rem; margin-bottom: 4px; }
        .back-fab {
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 500;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(0,0,0,0.35);
            color: white;
            font-size: 1.3rem;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .balance-card {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }
        .balance-number {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
        }
        .balance-label {
            color: var(--text-light);
            margin-top: 8px;
            font-size: 1rem;
        }
        .balance-card.empty .balance-number { color: var(--danger); }
        .balance-card.low .balance-number { color: var(--warning); }
        .empty-msg {
            margin-top: 14px;
            padding: 10px;
            background: #f8d7da;
            color: #721c24;
            border-radius: 10px;
            font-size: 0.9rem;
        }
        .section-title {
            font-weight: 700;
            margin: 20px 0 10px;
            font-size: 1.05rem;
        }
        .not-found {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }
        .photo-edit-btn {
            display: block;
            margin: 6px auto 0;
            background: rgba(255,255,255,0.25);
            color: white;
            border: none;
            border-radius: 20px;
            padding: 4px 14px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .user-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d3436;
            color: white;
            padding: 10px 22px;
            border-radius: 20px;
            font-size: 0.9rem;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .user-toast.show { opacity: 1; }
        #u-camera-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }
        #u-camera-overlay.visible { display: flex; }
        #u-camera-box {
            background: white;
            border-radius: 20px;
            padding: 20px;
            width: 92vw;
            max-width: 400px;
            text-align: center;
        }
        #u-qr-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }
        #u-qr-overlay.visible { display: flex; }
        #u-qr-box {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 92vw;
            max-width: 340px;
            text-align: center;
        }
        #u-install-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }
        #u-install-overlay.visible { display: flex; }
        #u-install-box {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 92vw;
            max-width: 340px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="content"></div>
<button class="back-fab" onclick="uGoBack()" title="חזרה" aria-label="חזרה">→</button>
<div id="u-toast" class="user-toast"></div>

<!-- Camera overlay for photo update -->
<div id="u-camera-overlay">
    <div id="u-camera-box">
        <video id="u-camera-video" autoplay playsinline style="width:100%;border-radius:12px;background:#000"></video>
        <canvas id="u-camera-canvas" hidden></canvas>
        <p id="u-camera-error" style="color:#e17055;margin-top:8px;font-size:0.85rem"></p>
        <div style="display:flex;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap">
            <button onclick="uCapturePhoto()" style="background:var(--success);color:white;border:none;border-radius:12px;padding:10px 18px;font-size:1rem;cursor:pointer">📸 צלם</button>
            <button onclick="uSwitchCamera()" style="background:#636e72;color:white;border:none;border-radius:12px;padding:10px 18px;font-size:1rem;cursor:pointer">🔄 החלף</button>
            <button onclick="uCloseCamera()" style="background:#d63031;color:white;border:none;border-radius:12px;padding:10px 18px;font-size:1rem;cursor:pointer">ביטול</button>
        </div>
    </div>
</div>
<input type="file" id="u-photo-file" accept="image/*" hidden>

<!-- QR overlay -->
<div id="u-qr-overlay">
    <div id="u-qr-box">
        <h2 style="margin-bottom:12px">הקוד שלי לכניסה</h2>
        <div id="u-qr-canvas" style="display:flex;justify-content:center"></div>
        <p style="margin-top:12px;color:var(--text-light);font-size:0.9rem">הצג/י את הקוד למסך הכניסה</p>
        <button onclick="uCloseQr()" style="margin-top:12px;background:#d63031;color:white;border:none;border-radius:12px;padding:10px 18px;font-size:1rem;cursor:pointer">סגור</button>
    </div>
</div>

<!-- Install instructions overlay: manual fallback for iOS (no native install
     prompt exists there) and for Android/Chrome before beforeinstallprompt
     has fired (Chrome withholds it based on its own engagement heuristics,
     so it's often unavailable on a member's very first visit). -->
<div id="u-install-overlay">
    <div id="u-install-box">
        <h2 style="margin-bottom:12px">📲 הוספה למסך הבית</h2>
        <p id="u-install-instructions" style="text-align:right;line-height:1.9"></p>
        <button onclick="uCloseInstall()" style="margin-top:12px;background:#d63031;color:white;border:none;border-radius:12px;padding:10px 18px;font-size:1rem;cursor:pointer">סגור</button>
    </div>
</div>

    <script>
        (function() {
            const _cfg = {
                apiKey: "AIzaSyCOBQNSRju9Fgxy3_DZAWapzuyv0DoUUCo",
                projectId: "club-app-8f954",
                appId: "1:181296970595:web:6cd7578d10d563f3c73156"
            };

            function esc(str) {
                const d = document.createElement('div');
                d.textContent = str || '';
                return d.innerHTML;
            }
            function fmtDateTime(date) {
                return date.toLocaleDateString('he-IL') + ' ' +
                    date.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
            }

            const params = new URLSearchParams(location.search);
            const id = params.get('id');
            const content = document.getElementById('content');

            if (!id) {
                content.innerHTML = '<div class="not-found"><h2>משתתף לא נמצא</h2><p>ודא שסרקת את ה-QR האישי שלך</p></div>';
                return;
            }

            content.innerHTML = '<div style="text-align:center;padding:60px;color:#b2bec3;">טוען...</div>';

            // PWA installability: register SW (user.html never loads app.js, which
            // is where index.html normally does this) and inject a manifest scoped
            // to this member's own URL so "Add to Home Screen" opens their card
            // directly, not the admin app.
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).catch(() => {});
            }
            (function injectManifest() {
                const iconBase = new URL('.', location.href).href;
                const manifest = {
                    name: 'הכרטיסיה שלי',
                    short_name: 'הכרטיסיה שלי',
                    start_url: location.pathname + location.search,
                    scope: location.pathname + location.search,
                    display: 'standalone',
                    background_color: '#f8f9fa',
                    theme_color: '#6c5ce7',
                    orientation: 'portrait',
                    icons: [
                        { src: iconBase + 'icon-192.png', sizes: '192x192', type: 'image/png' },
                        { src: iconBase + 'icon-512.png', sizes: '512x512', type: 'image/png' }
                    ]
                };
                const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
                const link = document.createElement('link');
                link.rel = 'manifest';
                link.href = URL.createObjectURL(blob);
                document.head.appendChild(link);
            })();

            let _deferredInstallPrompt = null;
            const _isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
            const _isStandalone = window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;

            window.addEventListener('beforeinstallprompt', e => {
                e.preventDefault();
                _deferredInstallPrompt = e;
                render();
            });
            window.addEventListener('appinstalled', () => {
                _deferredInstallPrompt = null;
                render();
            });

            function uCanInstall() {
                return !_isStandalone;
            }

            function uCopyLink() {
                navigator.clipboard.writeText(location.href)
                    .then(() => uToast('הקישור הועתק, הדבק/י בדפדפן'))
                    .catch(() => uToast('לא ניתן להעתיק אוטומטית'));
            }
            window.uCopyLink = uCopyLink;

            // WhatsApp/Instagram/etc. often open links in an embedded browser
            // (some are Chrome Custom Tabs, indistinguishable from real Chrome by
            // user agent) that silently blocks PWA install with no reliable way to
            // detect it client-side. So instead of trying to detect it, the "copy
            // link" fallback is always shown alongside the normal instructions.
            function uInstall() {
                if (_deferredInstallPrompt) {
                    _deferredInstallPrompt.prompt();
                    _deferredInstallPrompt.userChoice.finally(() => { _deferredInstallPrompt = null; render(); });
                    return;
                }
                document.getElementById('u-install-instructions').innerHTML = (_isIOS ? `
                    1. הקש/י על כפתור השיתוף <span style="font-weight:700">⬆️</span> בתחתית המסך<br>
                    2. גלול/י ובחר/י <span style="font-weight:700">"הוסף למסך הבית"</span><br>
                    3. הקש/י <span style="font-weight:700">"הוסף"</span>
                ` : `
                    1. הקש/י על תפריט הדפדפן <span style="font-weight:700">⋮</span> (בפינה העליונה)<br>
                    2. בחר/י <span style="font-weight:700">"הוספה למסך הבית"</span> או <span style="font-weight:700">"התקנת אפליקציה"</span><br>
                    3. אשר/י את ההוספה
                `) + `
                    <div style="margin-top:16px;padding-top:12px;border-top:1px solid #eee;font-size:0.85rem;color:#636e72">
                        לא רואה/ה תפריט כזה? כנראה שהעמוד נפתח בתוך אפליקציה אחרת (כמו וואטסאפ).
                        <button onclick="uCopyLink()" style="background:none;border:none;color:var(--primary);text-decoration:underline;font-weight:700;cursor:pointer;padding:0;font-size:inherit">העתק/י את הקישור</button>
                        ופתח/י אותו בכרום/ספארי.
                    </div>
                `;
                document.getElementById('u-install-overlay').classList.add('visible');
            }

            function uCloseInstall() {
                document.getElementById('u-install-overlay').classList.remove('visible');
            }

            window.uInstall = uInstall;
            window.uCloseInstall = uCloseInstall;

            if (!firebase.apps.length) firebase.initializeApp(_cfg);
            const db = firebase.firestore();
            db.enablePersistence().catch(() => {});

            let _member = null;
            let _checkins = [];
            let _authReady = false;

            function uShowQr() {
                document.getElementById('u-qr-overlay').classList.add('visible');
                const box = document.getElementById('u-qr-canvas');
                box.innerHTML = '';
                if (typeof QRCode === 'undefined') return;
                new QRCode(box, {
                    text: location.origin + location.pathname + '?id=' + id,
                    width: 220,
                    height: 220,
                    colorDark: '#000000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });
            }

            function uCloseQr() {
                document.getElementById('u-qr-overlay').classList.remove('visible');
            }

            function uToast(msg) {
                const t = document.getElementById('u-toast');
                t.textContent = msg;
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 2500);
            }

            let uCameraStream = null;
            let uFacing = 'user';

            function uOpenCamera() {
                uFacing = 'user';
                document.getElementById('u-camera-overlay').classList.add('visible');
                document.getElementById('u-camera-error').textContent = '';
                uStartStream();
            }

            function uStartStream() {
                if (uCameraStream) uCameraStream.getTracks().forEach(t => t.stop());
                const video = document.getElementById('u-camera-video');
                navigator.mediaDevices.getUserMedia({ video: { facingMode: uFacing } })
                    .then(s => { uCameraStream = s; video.srcObject = s; })
                    .catch(() => { document.getElementById('u-camera-error').textContent = 'לא ניתן לגשת למצלמה'; });
            }

            function uSwitchCamera() {
                uFacing = uFacing === 'user' ? 'environment' : 'user';
                uStartStream();
            }

            function uCloseCamera() {
                if (uCameraStream) { uCameraStream.getTracks().forEach(t => t.stop()); uCameraStream = null; }
                document.getElementById('u-camera-overlay').classList.remove('visible');
            }

            function uCapturePhoto() {
                const video = document.getElementById('u-camera-video');
                const canvas = document.getElementById('u-camera-canvas');
                if (!video.videoWidth) return;
                const max = 300;
                let w = video.videoWidth, h = video.videoHeight;
                if (w > h && w > max) { h = Math.round(h * max / w); w = max; }
                else if (h > max) { w = Math.round(w * max / h); h = max; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(video, 0, 0, w, h);
                const dataUrl = canvas.toDataURL('image/jpeg', 0.75);
                uCloseCamera();
                uSavePhoto(dataUrl);
            }

            function uSavePhoto(dataUrl) {
                db.collection('members').doc(id).update({ photo: dataUrl })
                    .then(() => uToast('תמונה עודכנה ✓'))
                    .catch(() => uToast('שגיאה בשמירה'));
            }

            // Gallery picker
            document.getElementById('u-photo-file').addEventListener('change', e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    const img = new Image();
                    img.onload = () => {
                        const max = 300;
                        let w = img.width, h = img.height;
                        if (w > h && w > max) { h = Math.round(h * max / w); w = max; }
                        else if (h > max) { w = Math.round(w * max / h); h = max; }
                        const c = document.createElement('canvas');
                        c.width = w; c.height = h;
                        c.getContext('2d').drawImage(img, 0, 0, w, h);
                        uSavePhoto(c.toDataURL('image/jpeg', 0.75));
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
                e.target.value = '';
            });

            function render() {
                if (!_member) {
                    content.innerHTML = '<div class="not-found"><h2>משתתף לא נמצא</h2><p>ודא שסרקת את ה-QR האישי שלך</p></div>';
                    return;
                }
                const balance = _member.balance || 0;
                const balanceClass = balance <= 0 ? 'empty' : (balance <= 2 ? 'low' : '');
                const sorted = _checkins.slice().sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
                const historyHtml = sorted.slice(0, 15).map(c => `
                    <div class="recent-item">
                        <span>${fmtDateTime(new Date(c.timestamp))}</span>
                        <span>${c.entryType === 'couple' ? 'כניסה זוגית (-2)' : 'כניסה בודדת (-1)'}</span>
                    </div>
                `).join('') || '<p style="color:#b2bec3;text-align:center;padding:20px">אין כניסות עדיין</p>';

                content.innerHTML = `
                    <div class="user-page">
                        <div class="club-logo">
                            <img src="LOGO BIG.jpg" alt="לוגו המועדון">
                        </div>
                        <div class="user-header">
                            ${_member.photo ? `<img src="${_member.photo}" class="avatar" style="width:70px;height:70px;margin-bottom:8px;border:3px solid white">` : ''}
                            <h1>👋 שלום, ${esc(_member.name)}</h1>
                            <p>הכרטיסיה האישית שלך</p>
                            <div style="display:flex;gap:8px;justify-content:center;margin-top:8px">
                                <button class="photo-edit-btn" id="btn-camera">📷 עדכן תמונה</button>
                                <button class="photo-edit-btn" id="btn-gallery">🖼️ מהגלריה</button>
                            </div>
                        </div>
                        <button id="btn-qr" style="display:block;width:100%;background:var(--primary);color:white;border:none;border-radius:16px;padding:14px;font-size:1.05rem;font-weight:700;cursor:pointer;margin-bottom:16px">📷 הצג קוד לכניסה</button>
                        ${uCanInstall() ? `<button id="btn-install" style="display:block;width:100%;background:#00b894;color:white;border:none;border-radius:16px;padding:12px;font-size:0.95rem;font-weight:700;cursor:pointer;margin-bottom:16px">📲 הוסף למסך הבית</button>` : ''}
                        <div class="balance-card ${balanceClass}">
                            <div class="balance-number">${balance}</div>
                            <div class="balance-label">כניסות נותרו</div>
                            ${balance <= 0 ? '<div class="empty-msg">אין יתרת כניסות. יש לפנות למנהל כדי להוסיף כניסות.</div>' : ''}
                        </div>
                        <div class="section-title">היסטוריית כניסות</div>
                        <div class="recent-list">${historyHtml}</div>
                    </div>
                `;
                document.getElementById('btn-camera')?.addEventListener('click', uOpenCamera);
                document.getElementById('btn-gallery')?.addEventListener('click', () => document.getElementById('u-photo-file').click());
                document.getElementById('btn-qr')?.addEventListener('click', uShowQr);
                document.getElementById('btn-install')?.addEventListener('click', uInstall);
            }

            window.uCapturePhoto = uCapturePhoto;
            window.uSwitchCamera = uSwitchCamera;
            window.uCloseCamera = uCloseCamera;
            window.uCloseQr = uCloseQr;

            function uGoBack() {
                if (document.referrer && document.referrer.indexOf(location.origin) === 0 && history.length > 1) {
                    history.back();
                } else {
                    location.href = 'index.html';
                }
            }
            window.uGoBack = uGoBack;

            // Sign in anonymously, then start Firestore listeners
            firebase.auth().signInAnonymously().then(() => {
                db.collection('members').doc(id).onSnapshot(doc => {
                    _member = doc.exists ? doc.data() : null;
                    render();
                }, () => {
                    content.innerHTML = '<div class="not-found"><h2>שגיאת חיבור</h2><p>נסה שוב מאוחר יותר</p></div>';
                });

                db.collection('checkins').where('memberId', '==', id).onSnapshot(snap => {
                    _checkins = snap.docs.map(d => d.data());
                    render();
                }, () => {});
            }).catch(() => {
                content.innerHTML = '<div class="not-found"><h2>שגיאת חיבור</h2><p>נסה שוב מאוחר יותר</p></div>';
            });
        })();
    </script>
</body>
</html>
