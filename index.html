<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="מועדון">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <title>מערכת ניהול מועדון</title>
    <link rel="stylesheet" href="style.css?v=24">
    <style>
        #guestlist-vip, #guestlist-temp { max-height: none !important; overflow-y: visible !important; }
    </style>
</head>
<body>
    <div id="app">
        <!-- Top Bar -->
        <header class="top-bar">
            <h1>🎫 ניהול מועדון</h1>
            <button class="icon-btn" id="top-nfc-btn" onclick="toggleNfc()" title="הפעל/עצור NFC">📵</button>
            <button class="icon-btn" onclick="showPage('settings')">⚙️</button>
        </header>

        <!-- Navigation -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="members" onclick="showPage('members')">
                <span class="nav-icon">👥</span>
                <span>משתתפים</span>
            </button>
            <button class="nav-btn" data-page="checkin" onclick="showPage('checkin')">
                <span class="nav-icon">📷</span>
                <span>כניסה</span>
            </button>
            <button class="nav-btn" data-page="payments" onclick="showPage('payments')">
                <span class="nav-icon">💳</span>
                <span>כרטיסיות</span>
            </button>
            <button class="nav-btn" data-page="reports" onclick="showPage('reports')">
                <span class="nav-icon">📊</span>
                <span>דוחות</span>
            </button>
            <button class="nav-btn" data-page="guestlist" onclick="showPage('guestlist')">
                <span class="nav-icon">⭐</span>
                <span>אורחים</span>
            </button>
        </nav>

        <!-- Members Page -->
        <main id="page-members" class="page active">
            <div class="search-bar">
                <input type="text" id="search-members" placeholder="🔍 חיפוש משתתף..." oninput="filterMembers()">
                <button class="btn btn-primary" onclick="showAddMember()">+ הוספה</button>
            </div>
            <div id="members-list" class="card-list"></div>
        </main>

        <!-- Check-in Page -->
        <main id="page-checkin" class="page">
            <div class="checkin-container">
                <div class="checkin-tabs">
                    <button class="tab-btn active" onclick="switchCheckinTab('qr')">📷 QR</button>
                    <button class="tab-btn" onclick="switchCheckinTab('nfc')">📱 NFC</button>
                    <button class="tab-btn" onclick="switchCheckinTab('manual')">✍️ ידני</button>
                </div>
                <div id="checkin-qr" class="checkin-tab-content active">
                    <div id="qr-reader" class="qr-reader-box">
                        <p>לחץ להפעלת המצלמה</p>
                        <button class="btn btn-primary" onclick="startQrScanner()">הפעל סורק QR</button>
                    </div>
                    <video id="qr-video" class="qr-video" playsinline></video>
                    <canvas id="qr-canvas" hidden></canvas>
                </div>
                <div id="checkin-nfc" class="checkin-tab-content">
                    <div class="nfc-container">
                        <div class="nfc-icon">📱</div>
                        <p>קרב את הכרטיס/טלפון למכשיר</p>
                        <button class="btn btn-primary" id="nfc-btn" onclick="toggleNfc()">הפעל NFC</button>
                        <p id="nfc-status" class="status-msg"></p>
                    </div>
                </div>
                <div id="checkin-manual" class="checkin-tab-content">
                    <div class="manual-checkin">
                        <input type="text" id="manual-checkin-search" placeholder="🔍 חפש משתתף לצ'ק-אין..." oninput="filterCheckinMembers()">
                        <div id="checkin-members-list" class="card-list"></div>
                    </div>
                </div>
                <div id="checkin-result" class="checkin-result" hidden></div>
            </div>
        </main>

        <!-- Payments Page -->
        <main id="page-payments" class="page">
            <div class="search-bar">
                <input type="text" id="search-payments" placeholder="🔍 חיפוש..." oninput="filterPayments()">
                <button class="btn btn-primary" onclick="showAddPayment()">+ כניסות</button>
            </div>
            <div id="payments-list" class="card-list"></div>
        </main>

        <!-- Reports Page -->
        <main id="page-reports" class="page">
            <div class="reports-container">
                <div class="report-card summary-card">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
                        <h3 style="margin:0">סיכום</h3>
                        <div style="display:flex;gap:8px">
                            <button class="btn btn-success" onclick="exportExcel()" style="font-size:0.85rem;padding:6px 12px">📊 הורדה</button>
                            <button class="btn btn-primary" onclick="shareReport()" style="font-size:0.85rem;padding:6px 12px">📤 שיתוף</button>
                        </div>
                    </div>
                    <div class="period-selector" style="margin-bottom:12px">
                        <button class="filter-btn" data-period="day" onclick="showReport()">יום</button>
                        <button class="filter-btn active" data-period="week" onclick="showReport()">שבוע</button>
                        <button class="filter-btn" data-period="month" onclick="showReport()">חודש</button>
                        <button class="filter-btn" data-period="year" onclick="showReport()">שנה</button>
                    </div>
                    <select id="report-terminal" onchange="showReport()" style="width:100%;padding:8px;border-radius:10px;border:1px solid #ddd;font-size:0.95rem;margin-bottom:12px">
                        <option value="">כל המסופים</option>
                    </select>
                    <div class="stats-grid">
                        <div class="stat">
                            <span class="stat-value" id="stat-members">0</span>
                            <span class="stat-label">משתתפים</span>
                            <span id="stat-members-detail" style="font-size:0.7rem;color:var(--text-light);margin-top:2px;display:block;direction:ltr;unicode-bidi:bidi-override"></span>
                        </div>
                        <div class="stat">
                            <span class="stat-value" id="stat-revenue">₪0</span>
                            <span class="stat-label">הכנסות</span>
                            <span id="stat-revenue-detail" style="font-size:0.7rem;color:var(--text-light);margin-top:2px;display:block"></span>
                        </div>
                        <div class="stat">
                            <span class="stat-value" id="stat-active-subs">0</span>
                            <span class="stat-label">ללא יתרה</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value" id="stat-tickets-sold">0</span>
                            <span class="stat-label">כרטיסיות</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value" id="stat-entries-used">0</span>
                            <span class="stat-label">ניקובים</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value" id="stat-guests-today">0</span>
                            <span class="stat-label">אורחים</span>
                        </div>
                    </div>
                </div>
                <div class="report-card">
                    <h3>פעילות לפי תקופה</h3>
                    <div id="recent-checkins" class="recent-list"></div>
                </div>
            </div>
        </main>

        <!-- Guest List Page -->
        <main id="page-guestlist" class="page">
            <div class="checkin-container">
                <div class="checkin-tabs">
                    <button class="tab-btn active" id="guest-tab-temp" onclick="switchGuestTab('temp')">🕐 זמניים</button>
                    <button class="tab-btn" id="guest-tab-vip" onclick="switchGuestTab('vip')">⭐ קבועים</button>
                </div>
                <div id="guest-panel-temp" class="checkin-tab-content active" style="padding:0 4px">
                    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
                        <button class="btn btn-primary" style="font-size:0.85rem;padding:6px 14px" onclick="showAddTempGuest()">+ הוסף אורח</button>
                    </div>
                    <div id="guestlist-temp" class="recent-list" style="max-height:none"></div>
                </div>
                <div id="guest-panel-vip" class="checkin-tab-content" style="padding:0 4px">
                    <div id="guestlist-vip" class="recent-list" style="max-height:none"></div>
                </div>
            </div>
        </main>

        <!-- Settings Page -->
        <main id="page-settings" class="page">
            <div class="settings-container">
                <h2>⚙️ הגדרות</h2>
                <div class="setting-group">
                    <label>שם האירוע</label>
                    <input type="text" id="setting-event-name" placeholder="שם האירוע">
                </div>
                <div class="setting-group">
                    <label>שם המסוף (מזהה מכשיר זה בדוחות)</label>
                    <input type="text" id="setting-terminal" placeholder="לדוגמה: כניסה ראשית">
                </div>
                <div class="setting-group">
                    <label>מסופים רשומים</label>
                    <div id="terminals-list"></div>
                </div>
                <div class="setting-group">
                    <label>מחיר כרטיסיה (₪)</label>
                    <input type="number" id="setting-price" placeholder="0" onchange="saveSetting('singlePrice', this.value)">
                </div>
                <div class="setting-group">
                    <label>מחיר כניסה בודדת (₪)</label>
                    <input type="number" id="setting-sub-price" placeholder="0" onchange="saveSetting('couplePrice', this.value)">
                </div>
                <button class="btn btn-primary btn-block" onclick="saveAllSettings()" style="margin-bottom:16px">💾 שמור הגדרות</button>
                <div class="setting-group">
                    <label>ימי פעילות</label>
                    <div class="days-selector">
                        <label><input type="checkbox" value="0" onchange="saveDays()"> ראשון</label>
                        <label><input type="checkbox" value="1" onchange="saveDays()"> שני</label>
                        <label><input type="checkbox" value="2" onchange="saveDays()"> שלישי</label>
                        <label><input type="checkbox" value="3" onchange="saveDays()"> רביעי</label>
                        <label><input type="checkbox" value="4" onchange="saveDays()"> חמישי</label>
                        <label><input type="checkbox" value="5" onchange="saveDays()"> שישי</label>
                        <label><input type="checkbox" value="6" onchange="saveDays()"> שבת</label>
                    </div>
                </div>
                <div class="setting-group">
                    <h3>גיבוי ושחזור</h3>
                    <button class="btn btn-primary" onclick="exportData()">📥 ייצוא נתונים</button>
                    <button class="btn btn-secondary" onclick="document.getElementById('import-file').click()">📤 ייבוא נתונים</button>
                    <input type="file" id="import-file" accept=".json" hidden onchange="importData(event)">
                </div>
                <div class="setting-group">
                    <h3>איפוס נתונים</h3>
                    <p style="font-size:0.85rem;color:var(--text-light);margin-bottom:10px">מוחק כניסות, רכישות ומאפס יתרות. משתתפים ואורחים נשמרים.</p>
                    <button class="btn btn-danger" onclick="resetAllData()">🗑 מחק כניסות ורכישות</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 id="modal-title"></h3>
                <button class="icon-btn" onclick="closeModal()">✕</button>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <!-- Camera Capture Overlay (separate from modal so it can layer on top of forms) -->
    <div id="camera-overlay" class="modal-overlay" style="z-index:300">
        <div class="modal">
            <div class="modal-header">
                <h3>צילום תמונה</h3>
                <button class="icon-btn" onclick="closeCameraCapture()">✕</button>
            </div>
            <div class="modal-body" style="text-align:center">
                <video id="camera-video" autoplay playsinline style="width:100%;border-radius:12px;background:#000"></video>
                <canvas id="camera-canvas" hidden></canvas>
                <p id="camera-error" style="color:var(--danger);margin-top:10px"></p>
                <div style="display:flex;gap:10px;margin-top:14px;justify-content:center">
                    <button class="btn btn-success" id="camera-capture-btn" onclick="capturePhoto()">📸 צלם</button>
                    <button class="btn btn-secondary" onclick="switchCameraFacing()">🔄 החלף מצלמה</button>
                    <button class="btn btn-danger" onclick="closeCameraCapture()">ביטול</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Check-in Full Screen Overlay -->
    <div id="checkin-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:white;z-index:500;overflow-y:auto;padding:32px 20px;box-sizing:border-box">
        <div style="max-width:420px;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:16px">
            <div id="co-avatar" style="margin-bottom:4px"></div>
            <div style="text-align:center">
                <div id="co-name" style="font-size:1.6rem;font-weight:700"></div>
                <div id="co-balance" style="font-size:1rem;margin-top:6px"></div>
            </div>
            <div id="co-actions" style="width:100%;display:flex;flex-direction:column;gap:12px;margin-top:8px"></div>
            <button class="btn btn-danger btn-block" style="margin-top:8px" onclick="closeCheckinOverlay()">ביטול</button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast" hidden></div>

    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="jsQR.js"></script>
    <script src="qrcode.min.js"></script>
    <script src="app.js?v=96"></script>
</body>
</html>
