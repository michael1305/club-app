<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6c5ce7">
    <title>הרשמה למועדון</title>
    <link rel="stylesheet" href="style.css?v=21">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        .reg-page {
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 20px;
            min-height: 100vh;
        }
        .reg-logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .reg-logo img {
            width: 110px;
            height: auto;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        .reg-card {
            background: white;
            border-radius: 20px;
            padding: 28px 22px;
            box-shadow: var(--shadow);
        }
        .reg-card h2 {
            text-align: center;
            margin-bottom: 6px;
            font-size: 1.4rem;
            color: var(--primary);
        }
        .reg-card p.subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .reg-field {
            margin-bottom: 16px;
        }
        .reg-field label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }
        .reg-field input[type="text"],
        .reg-field input[type="tel"],
        .reg-field input[type="email"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        .reg-field input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .reg-field input.error {
            border-color: var(--danger);
        }
        .reg-error {
            color: var(--danger);
            font-size: 0.82rem;
            margin-top: 4px;
            display: none;
        }
        .reg-error.show { display: block; }

        /* Photo picker */
        .photo-picker {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }
        .photo-preview {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            display: none;
        }
        .photo-placeholder {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: #f0eeff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            border: 2px dashed #b2a4f5;
        }
        .photo-btns {
            display: flex;
            gap: 8px;
        }
        .photo-btn {
            background: #f0eeff;
            color: var(--primary);
            border: none;
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 0.88rem;
            font-family: inherit;
            cursor: pointer;
            font-weight: 600;
        }

        .reg-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            font-family: inherit;
            transition: opacity 0.2s;
        }
        .reg-submit:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Camera overlay */
        #reg-camera-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }
        #reg-camera-overlay.visible { display: flex; }
        #reg-camera-box {
            background: white;
            border-radius: 20px;
            padding: 20px;
            width: 92vw;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="reg-page">
        <div class="reg-logo">
            <img src="LOGO BIG.jpg" alt="לוגו המועדון">
        </div>
        <div class="reg-card">
            <div id="reg-form-section">
                <h2>הרשמה למועדון</h2>
                <p class="subtitle">מלא את הפרטים ואנו נוסיף אותך בהקדם</p>

                <div class="reg-field">
                    <label for="reg-name">שם מלא</label>
                    <input type="text" id="reg-name" placeholder="ישראל ישראלי" autocomplete="name">
                    <div class="reg-error" id="err-name">נא להזין שם מלא</div>
                </div>

                <div class="reg-field">
                    <label for="reg-phone">טלפון</label>
                    <input type="tel" id="reg-phone" placeholder="050-0000000" autocomplete="tel">
                    <div class="reg-error" id="err-phone">נא להזין מספר טלפון תקין</div>
                </div>

                <div class="reg-field">
                    <label for="reg-email">אימייל <span style="font-weight:400;color:var(--text-light)">(אופציונלי)</span></label>
                    <input type="email" id="reg-email" placeholder="israel@example.com" autocomplete="email">
                </div>

                <div class="reg-field">
                    <label for="reg-birthdate">תאריך לידה</label>
                    <input type="date" id="reg-birthdate">
                    <div class="reg-error" id="err-birthdate">נא להזין תאריך לידה</div>
                </div>

                <div class="reg-field">
                    <label>תמונה <span style="font-weight:400;color:var(--text-light)">(אופציונלי)</span></label>
                    <div class="photo-picker">
                        <div class="photo-placeholder" id="reg-photo-placeholder">👤</div>
                        <img id="reg-photo-preview" class="photo-preview" alt="תמונה">
                        <div class="photo-btns">
                            <button type="button" class="photo-btn" id="btn-reg-camera">📷 צלם</button>
                            <button type="button" class="photo-btn" id="btn-reg-gallery">🖼️ גלריה</button>
                        </div>
                    </div>
                </div>

                <button class="reg-submit" id="reg-btn">הרשמה</button>
            </div>
        </div>
    </div>

    <!-- Camera overlay -->
    <div id="reg-camera-overlay">
        <div id="reg-camera-box">
            <video id="reg-camera-video" autoplay playsinline style="width:100%;border-radius:12px;background:#000"></video>
            <canvas id="reg-camera-canvas" hidden></canvas>
            <p id="reg-camera-error" style="color:#e17055;margin-top:8px;font-size:0.85rem"></p>
            <div style="display:flex;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap">
                <button id="btn-capture" style="background:var(--success);color:white;border:none;border-radius:12px;padding:10px 18px;font-size:1rem;cursor:pointer">📸 צלם</button>
                <button id="btn-switch" style="background:#636e72;color:white;border:none;border-radius:12px;padding:10px 18px;font-size:1rem;cursor:pointer">🔄 החלף</button>
                <button id="btn-close-cam" style="background:#d63031;color:white;border:none;border-radius:12px;padding:10px 18px;font-size:1rem;cursor:pointer">ביטול</button>
            </div>
        </div>
    </div>
    <input type="file" id="reg-photo-file" accept="image/*" hidden>

    <script>
        (function () {
            const _cfg = {
                apiKey: "AIzaSyCOBQNSRju9Fgxy3_DZAWapzuyv0DoUUCo",
                projectId: "club-app-8f954",
                appId: "1:181296970595:web:6cd7578d10d563f3c73156"
            };
            if (!firebase.apps.length) firebase.initializeApp(_cfg);
            const db = firebase.firestore();
            db.enablePersistence().catch(() => {});

            let _photoDataUrl = null;
            let _cameraStream = null;
            let _facing = 'user';

            function genId() {
                return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
            }

            function validatePhone(p) {
                return /^[\d\-\+\s]{7,15}$/.test(p.trim());
            }

            function resizeImage(src, cb) {
                const img = new Image();
                img.onload = () => {
                    const max = 300;
                    let w = img.width, h = img.height;
                    if (w > h && w > max) { h = Math.round(h * max / w); w = max; }
                    else if (h > max) { w = Math.round(w * max / h); h = max; }
                    const c = document.createElement('canvas');
                    c.width = w; c.height = h;
                    c.getContext('2d').drawImage(img, 0, 0, w, h);
                    cb(c.toDataURL('image/jpeg', 0.75));
                };
                img.src = src;
            }

            function setPhotoPreview(dataUrl) {
                _photoDataUrl = dataUrl;
                document.getElementById('reg-photo-placeholder').style.display = 'none';
                const prev = document.getElementById('reg-photo-preview');
                prev.src = dataUrl;
                prev.style.display = 'block';
            }

            // Camera
            function openCamera() {
                _facing = 'user';
                document.getElementById('reg-camera-overlay').classList.add('visible');
                document.getElementById('reg-camera-error').textContent = '';
                startStream();
            }

            function startStream() {
                if (_cameraStream) _cameraStream.getTracks().forEach(t => t.stop());
                navigator.mediaDevices.getUserMedia({ video: { facingMode: _facing } })
                    .then(s => { _cameraStream = s; document.getElementById('reg-camera-video').srcObject = s; })
                    .catch(() => { document.getElementById('reg-camera-error').textContent = 'לא ניתן לגשת למצלמה'; });
            }

            function closeCamera() {
                if (_cameraStream) { _cameraStream.getTracks().forEach(t => t.stop()); _cameraStream = null; }
                document.getElementById('reg-camera-overlay').classList.remove('visible');
            }

            document.getElementById('btn-reg-camera').addEventListener('click', openCamera);
            document.getElementById('btn-switch').addEventListener('click', () => { _facing = _facing === 'user' ? 'environment' : 'user'; startStream(); });
            document.getElementById('btn-close-cam').addEventListener('click', closeCamera);
            document.getElementById('btn-capture').addEventListener('click', () => {
                const video = document.getElementById('reg-camera-video');
                const canvas = document.getElementById('reg-camera-canvas');
                if (!video.videoWidth) return;
                const max = 300;
                let w = video.videoWidth, h = video.videoHeight;
                if (w > h && w > max) { h = Math.round(h * max / w); w = max; }
                else if (h > max) { w = Math.round(w * max / h); h = max; }
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(video, 0, 0, w, h);
                closeCamera();
                setPhotoPreview(canvas.toDataURL('image/jpeg', 0.75));
            });

            // Gallery
            document.getElementById('btn-reg-gallery').addEventListener('click', () => document.getElementById('reg-photo-file').click());
            document.getElementById('reg-photo-file').addEventListener('change', e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => resizeImage(ev.target.result, setPhotoPreview);
                reader.readAsDataURL(file);
                e.target.value = '';
            });

            // Submit
            document.getElementById('reg-btn').addEventListener('click', () => {
                const name = document.getElementById('reg-name').value.trim();
                const phone = document.getElementById('reg-phone').value.trim();
                const email = document.getElementById('reg-email').value.trim();
                const birthDate = document.getElementById('reg-birthdate').value;
                let valid = true;

                document.getElementById('err-name').classList.toggle('show', !name);
                document.getElementById('reg-name').classList.toggle('error', !name);
                if (!name) valid = false;

                const phoneOk = validatePhone(phone);
                document.getElementById('err-phone').classList.toggle('show', !phoneOk);
                document.getElementById('reg-phone').classList.toggle('error', !phoneOk);
                if (!phoneOk) valid = false;

                document.getElementById('err-birthdate').classList.toggle('show', !birthDate);
                document.getElementById('reg-birthdate').classList.toggle('error', !birthDate);
                if (!birthDate) valid = false;

                if (!valid) return;

                const btn = document.getElementById('reg-btn');
                btn.disabled = true;
                btn.textContent = 'שולח...';

                let id;
                firebase.auth().signInAnonymously().then(() => {
                    id = genId();
                    const data = {
                        id,
                        name,
                        phone,
                        birthDate,
                        balance: 0,
                        createdAt: new Date().toISOString(),
                        registeredSelf: true
                    };
                    if (email) data.email = email;
                    if (_photoDataUrl) data.photo = _photoDataUrl;
                    return db.collection('members').doc(id).set(data);
                }).then(() => {
                    location.href = 'user.html?id=' + id;
                }).catch(() => {
                    btn.disabled = false;
                    btn.textContent = 'הרשמה';
                    alert('שגיאה בשליחה, נסה שוב');
                });
            });
        })();
    </script>
</body>
</html>
