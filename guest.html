<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6c5ce7">
    <title>הוספת אורח</title>
    <link rel="stylesheet" href="style.css?v=24">
    <style>
        .guest-page {
            max-width: 480px;
            margin: 0 auto;
            padding: 32px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .guest-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .guest-logo img {
            width: 90px;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(108,92,231,0.2);
        }
        .guest-card {
            background: white;
            border-radius: 20px;
            padding: 28px 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
        }
        .guest-card h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 1.3rem;
        }
        .guest-card .subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            direction: rtl;
            transition: border-color 0.2s;
        }
        .form-group input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }
        .slots-group {
            display: flex;
            gap: 12px;
        }
        .slot-option {
            flex: 1;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            background: white;
            transition: all 0.2s;
        }
        .slot-option.selected {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .submit-btn:active { background: var(--primary-dark); }
        .submit-btn:disabled { background: var(--border); cursor: default; }
        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-top: 8px;
            text-align: center;
            display: none;
        }
        .success-toast {
            display: none;
            background: var(--success);
            color: white;
            border-radius: 12px;
            padding: 12px 16px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 16px;
            font-size: 0.95rem;
        }
        .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 20px 0;
        }
        .guest-list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        .guest-list-item:last-child { border-bottom: none; }
        .guest-expiry {
            font-size: 0.78rem;
            color: var(--text-light);
        }
    </style>
</head>
<body>
    <div class="guest-page">
        <div class="guest-logo">
            <img src="LOGO.jpg" alt="לוגו" onerror="this.style.display='none'">
        </div>

        <div class="guest-card">
            <div id="success-toast" class="success-toast"></div>

            <h2>🎫 הוספת אורח</h2>
            <p class="subtitle">מלא את הפרטים להצטרפות לרשימת האורחים<br><strong>בתוקף 48 שעות</strong></p>

            <div class="form-group">
                <label>שם האורח *</label>
                <input type="text" id="guest-name" placeholder="שם מלא" autocomplete="name">
            </div>

            <div class="form-group">
                <label>כמות אנשים</label>
                <div class="slots-group">
                    <button class="slot-option selected" onclick="selectSlots(1)">👤 אדם אחד</button>
                    <button class="slot-option" onclick="selectSlots(2)">👥 שניים</button>
                </div>
            </div>

            <div id="error-msg" class="error-msg"></div>
            <button class="submit-btn" id="submit-btn" onclick="submitGuest()">הוסף לרשימה ✓</button>

            <hr class="divider">
            <h3 style="font-size:0.95rem;color:var(--text-light);margin-bottom:10px">📋 רשימה פעילה</h3>
            <div id="active-guests-list"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCOBQNSRju9Fgxy3_DZAWapzuyv0DoUUCo",
            projectId: "club-app-8f954",
            appId: "1:181296970595:web:6cd7578d10d563f3c73156"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let selectedSlots = 1;

        function selectSlots(n) {
            selectedSlots = n;
            document.querySelectorAll('.slot-option').forEach((btn, i) => {
                btn.classList.toggle('selected', i + 1 === n);
            });
        }

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).slice(2);
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function showToast(msg) {
            const el = document.getElementById('success-toast');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 3000);
        }

        async function submitGuest() {
            const name = document.getElementById('guest-name').value.trim();
            document.getElementById('error-msg').style.display = 'none';

            if (!name) { showError('נא להזין שם'); return; }

            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = 'שולח...';

            try {
                const now = new Date();
                await db.collection('guests').doc(generateId()).set({
                    id: generateId(),
                    name,
                    slots: selectedSlots,
                    createdAt: now.toISOString(),
                    expiresAt: new Date(now.getTime() + 48 * 3600000).toISOString()
                });

                showToast(`✓ ${name} נוסף לרשימה`);
                document.getElementById('guest-name').value = '';
                selectedSlots = 1;
                selectSlots(1);
            } catch (e) {
                showError('שגיאה בשמירה — נסה שוב');
            } finally {
                btn.disabled = false;
                btn.textContent = 'הוסף לרשימה ✓';
            }
        }

        function formatExpiry(isoStr) {
            const d = new Date(isoStr);
            const pad = n => String(n).padStart(2, '0');
            return `${pad(d.getDate())}.${pad(d.getMonth()+1)} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        async function deleteGuest(docId) {
            if (!confirm('למחוק אורח זה מהרשימה?')) return;
            await db.collection('guests').doc(docId).delete();
        }

        function loadActiveGuests() {
            const container = document.getElementById('active-guests-list');
            db.collection('guests').orderBy('createdAt', 'desc').onSnapshot(snap => {
                const now = new Date();
                const active = snap.docs
                    .map(d => ({ ...d.data(), _docId: d.id }))
                    .filter(g => g.expiresAt && new Date(g.expiresAt) > now);

                if (active.length === 0) {
                    container.innerHTML = '<p style="color:var(--text-light);font-size:0.85rem;text-align:center;padding:10px 0">אין אורחים פעילים כרגע</p>';
                    return;
                }

                container.innerHTML = active.map(g => {
                    const slotsLabel = g.slots === 2 ? '👥 שניים' : '👤 אחד';
                    return `<div class="guest-list-item">
                        <div>
                            <div style="font-weight:600">${g.name}</div>
                            <div style="font-size:0.78rem;color:var(--text-light)">${slotsLabel}</div>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px">
                            <div class="guest-expiry">⏱ עד ${formatExpiry(g.expiresAt)}</div>
                            <button onclick="deleteGuest('${g._docId}')" style="background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--danger);padding:4px;line-height:1">✕</button>
                        </div>
                    </div>`;
                }).join('');
            });
        }

        firebase.auth().signInAnonymously().then(loadActiveGuests);
    </script>
</body>
</html>
